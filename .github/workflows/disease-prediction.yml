name: Daily Project Log Bot

on:
  schedule:
    - cron: '30 3 * * *' # 3:30 AM UTC / 9:00 AM IST
  workflow_dispatch:

jobs:
  auto_commit:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write 

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Generate Content and Commit Message
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPO_NAME: ${{ github.repository }}
        run: |
          # 1. Grab project context safely
          if [ -f "README.md" ]; then
            PROJECT_CONTEXT=$(head -c 1000 README.md)
          else
            PROJECT_CONTEXT="No README available."
          fi
          
          # 2. Construct payload requesting strict JSON output
          JSON_PAYLOAD=$(jq -n \
            --arg repo "$REPO_NAME" \
            --arg context "$PROJECT_CONTEXT" \
            '{
              "contents": [{
                "parts": [{
                  "text": ("You are an AI maintaining the repository: " + $repo + ".\n\nREADME context:\n" + $context + "\n\nGenerate a daily project update. You must respond strictly with a valid JSON object containing exactly two keys:\n1. \"log_entry\": A single paragraph reflecting on the project or proposing a hypothetical next step.\n2. \"commit_message\": A concise, meaningful Git commit message (under 50 characters) summarizing the log entry. Do not use markdown blocks in the response.")
                }]
              }],
              "generationConfig": {
                "responseMimeType": "application/json"
              }
            }')
          
          # 3. Call the Gemini API
          RESPONSE=$(curl -s "https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent" \
            -H "x-goog-api-key: $Key" \
            -H "Content-Type: application/json" \
            -X POST \
            -d "$JSON_PAYLOAD")
            
          # 4. Extract the raw JSON string generated by the AI
          AI_RAW_JSON=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text // "{}"')
          
          # 5. Parse out the specific fields
          LOG_ENTRY=$(echo "$AI_RAW_JSON" | jq -r '.log_entry // "Automated check-in."')
          COMMIT_MSG=$(echo "$AI_RAW_JSON" | jq -r '.commit_message // "chore: automated daily project log entry"')
          
          # 6. Append the log entry to the file
          echo "### Log Entry: $(date +'%Y-%m-%d')" >> project_log.md
          echo "$LOG_ENTRY" >> project_log.md
          echo "" >> project_log.md
          
          # 7. Export the commit message to GitHub Env so the next step can access it
          echo "COMMIT_MSG=$COMMIT_MSG" >> $GITHUB_ENV
          
      - name: Commit and Push
        run: |
          git config --global user.name "Ateendra9"
          git config --global user.email "ateendrasrivastava@gmail.com"
          
          git add project_log.md
          
          # Use the dynamically generated commit message variable
          git diff --quiet && git diff --staged --quiet || git commit -m "$COMMIT_MSG"
          git push
